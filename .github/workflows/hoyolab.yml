name: HoYoLab Daily

on:
  schedule:
    # 04:05 UTC every day
    - cron: "5 4 * * *"

  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm start
        env:
          COOKIE: ${{ secrets.COOKIE }}
