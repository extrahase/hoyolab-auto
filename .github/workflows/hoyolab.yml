name: HoYoLab Daily

on:
  schedule:
    - cron: "5 4 * * *"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install

      - run: npm start
        env:
          COOKIE: ${{ secrets.COOKIE }}
